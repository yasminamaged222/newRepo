name: Build and deploy ASP+React to Azure Web App - acwebsite

on:
  push:
    branches:
      - main
  workflow_dispatch:
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build:
    runs-on: windows-latest

    steps:
      # ------------------ Checkout ------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------ Backend ------------------
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore src/Backend/Institute.Web/Institute.Web.sln

      - name: Build backend solution
        run: msbuild src/Backend/Institute.Web/Institute.Web.sln /p:Configuration=Release

      - name: Build and publish backend API
        run: |
          dotnet publish src/Backend/Institute.Web/Institute.API/Institute.API.csproj -c Release -o published

      # ------------------ Frontend ------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          cd src/Frontend
          npm install

      # ✅ Write .env file with secrets before build
      - name: Create .env file for frontend
        shell: pwsh
        run: |
          $envContent = @"
          VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          "@
          $envContent.Trim() | Out-File -FilePath "src/Frontend/.env" -Encoding utf8
          Write-Host "✅ .env file created"

      # Build frontend (Vite will pick up .env automatically)
      - name: Build frontend
        shell: pwsh
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          cd src/Frontend
          npm run build

      - name: Copy React dist to wwwroot
        shell: pwsh
        run: |
          if (!(Test-Path "published/wwwroot")) {
            New-Item -ItemType Directory -Path "published/wwwroot" | Out-Null
          }
          Copy-Item -Path src/Frontend/dist/* -Destination published/wwwroot -Recurse -Force
          
      - name: Move published files to icemt folder
        shell: pwsh
        run: |
          $icemtPath = "published/wwwroot/icemt"
          if (!(Test-Path $icemtPath)) {
            New-Item -ItemType Directory -Path $icemtPath | Out-Null
          }
          Get-ChildItem -Path published/wwwroot -Exclude icemt | 
          Move-Item -Destination $icemtPath -Force

      # ✅ Remove web.config from wwwroot — ASP.NET handles all routing via UseDefaultFiles + MapFallbackToFile
      #    A web.config in wwwroot causes IIS to skip "/" rewrite (treats it as a directory)
      - name: Remove web.config from wwwroot if present
        shell: pwsh
        run: |
          $dest = "published/wwwroot/web.config"
          if (Test-Path $dest) {
            Remove-Item -Path $dest -Force
            Write-Host "Removed web.config from wwwroot (ASP.NET handles routing)"
          } else {
            Write-Host "No web.config in wwwroot - nothing to remove"
          }


      # ------------------ Verify publish folder ------------------
      - name: Show publish folder contents
        shell: pwsh
        run: Get-ChildItem -Path published -Recurse

      - name: Verify publish folder
        shell: pwsh
        run: |
          $files = Get-ChildItem published -Recurse
          if ($files.Count -eq 0) {
            Write-Host "❌ ERROR: Publish folder is empty! Build/publish failed."
            exit 1
          } else {
            Write-Host "✅ Publish folder has files:"
            $files
          }

      # ------------------ Upload artifact ------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASP-app
          path: published/

  deploy:
    runs-on: windows-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ASP-app
          path: artifact

      - name: Verify downloaded artifact
        shell: pwsh
        run: |
          $files = Get-ChildItem artifact -Recurse
          if ($files.Count -eq 0) {
            Write-Host "❌ ERROR: Artifact folder is empty! Download failed."
            exit 1
          } else {
            Write-Host "✅ Artifact downloaded successfully."
            $files
          }

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: acwebsite__test
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
          target-path: icemt
